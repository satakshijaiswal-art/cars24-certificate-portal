<svg width="220" height="60" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Soft purple drop-shadow filter -->
  <defs>
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4A35FE" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- WHITE rounded-square tile (stays white even on purple backgrounds — provides contrast for the C) -->
  <rect x="2" y="2" width="56" height="56" rx="12" ry="12" fill="#FFFFFF" filter="url(#tileShadow)"/>

  <!--
    PURPLE "C" glyph — identical geometry to Variant A.
    Centre: (30, 30). Outer radius: 15. Inner radius: 9. Gap: ±32° on right.
  -->
  <path
    d="
      M 42.72,22.05
      A 15,15 0 1,0 42.72,37.95
      L 37.63,34.77
      A 9,9   0 1,1 37.63,25.23
      Z
    "
    fill="#4A35FE"
  />

  <!-- Purple accent dot — same position as Variant A -->
  <circle cx="43" cy="25" r="2.8" fill="#4A35FE"/>

  <!-- "Cars24" wordmark — WHITE, for use on purple/dark backgrounds -->
  <text
    x="72"
    y="41"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="32"
    font-weight="800"
    fill="#FFFFFF"
    letter-spacing="-1.2"
  >Cars24</text>

</svg>
