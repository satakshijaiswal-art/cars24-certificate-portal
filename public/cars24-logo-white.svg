<svg width="220" height="60" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Subtle drop-shadow filter (less visible on dark bg, but harmless) -->
  <defs>
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4A35FE" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- PURPLE rounded-square tile — hairline white stroke so it pops on purple backgrounds -->
  <rect x="1.5" y="1.5" width="57" height="57" rx="12.5" ry="12.5" fill="#4A35FE" stroke="#FFFFFF" stroke-width="1"/>

  <!--
    WHITE "C" glyph — identical geometry to Variant A.
    Centre: (30, 30). Outer radius: 15. Inner radius: 9. Gap: ±32° on right.
  -->
  <path
    d="
      M 42.72,22.05
      A 15,15 0 1,0 42.72,37.95
      L 37.63,34.77
      A 9,9   0 1,1 37.63,25.23
      Z
    "
    fill="#FFFFFF"
  />

  <!-- White accent mark — same position as Variant A -->
  <rect x="40" y="28.5" width="5" height="3" rx="1.5" fill="#FFFFFF"/>

  <!-- "Cars24" wordmark — WHITE, for use on purple/dark backgrounds -->
  <text
    x="72"
    y="41"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="32"
    font-weight="800"
    fill="#FFFFFF"
    letter-spacing="-1.2"
  >Cars24</text>

</svg>
