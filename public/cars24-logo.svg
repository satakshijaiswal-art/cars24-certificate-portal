<svg width="220" height="60" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Subtle drop-shadow for tile depth -->
  <defs>
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4A35FE" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- PURPLE rounded-square tile -->
  <rect x="2" y="2" width="56" height="56" rx="12" ry="12" fill="#4A35FE" filter="url(#tileShadow)"/>

  <!--
    WHITE "C" glyph — thick donut arc, opening facing 3 o'clock.
    Centre: (30, 30). Outer radius: 15. Inner radius: 9.
    Gap: ±32° from right (3 o'clock), total ~64° opening.

    Key coords (cx=30, cy=30):
      Outer top-right:    30 + 15·cos(32°), 30 - 15·sin(32°) = 42.72, 22.05
      Outer bottom-right: 30 + 15·cos(32°), 30 + 15·sin(32°) = 42.72, 37.95
      Inner top-right:    30 + 9·cos(32°),  30 - 9·sin(32°)  = 37.63, 25.23
      Inner bottom-right: 30 + 9·cos(32°),  30 + 9·sin(32°)  = 37.63, 34.77

    Path: start at outer-top, large arc CCW to outer-bottom, line to inner-bottom,
          small arc CW back to inner-top, close.
  -->
  <path
    d="
      M 42.72,22.05
      A 15,15 0 1,0 42.72,37.95
      L 37.63,34.77
      A 9,9   0 1,1 37.63,25.23
      Z
    "
    fill="#FFFFFF"
  />

  <!-- White accent mark — small rounded bar inside the C opening, at vertical centre -->
  <rect x="40" y="28.5" width="5" height="3" rx="1.5" fill="#FFFFFF"/>

  <!-- "Cars24" wordmark — purple, for use on white/light backgrounds -->
  <text
    x="72"
    y="41"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="32"
    font-weight="800"
    fill="#4A35FE"
    letter-spacing="-1.2"
  >Cars24</text>

</svg>
