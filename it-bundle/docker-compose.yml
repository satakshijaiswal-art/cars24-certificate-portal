version: "3.9"

services:
  cars24-cert-portal:
    build: .
    image: cars24-certificate-portal:latest
    container_name: cars24-cert-portal
    ports:
      - "80:80"          # Change left side (e.g. "8080:80") if port 80 is taken
    restart: unless-stopped
    environment:
      # Optional: set these to enable cloud-based background removal.
      # If omitted, the app still works fully — photos are processed in the browser.
      - REMOVE_BG_API_KEY=${REMOVE_BG_API_KEY:-}
      - PHOTOROOM_API_KEY=${PHOTOROOM_API_KEY:-}
      - CLIPDROP_API_KEY=${CLIPDROP_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
